services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bengali_asr_app:latest
    container_name: bengali_asr_container
    volumes:
      # Mounts current directory (including key.pem/cert.pem) to /app
      - ./:/app
    ports:
      - "8569:8569"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
    
    # [NEW] Override command to enable SSL using the files you just generated
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8569", "--ssl-keyfile", "key.pem", "--ssl-certfile", "cert.pem"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: "16g" 
    restart: unless-stopped
    
    # [UPDATED] Healthcheck must now use HTTPS and -k (insecure) for self-signed certs
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8569/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3